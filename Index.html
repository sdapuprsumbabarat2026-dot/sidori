                <input id="noDokumen" v-model="form.noDokumen" placeholder="Contoh: 001/SPK/VI/2025">
              </div>
              <div class="field">
                <label for="tanggal">Tanggal</label>
                <input id="tanggal" v-model="form.tanggal" type="date">
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="tahunAnggaran">Tahun Anggaran <span style="color:var(--danger)">*</span></label>
                <select id="tahunAnggaran" v-model="form.tahunAnggaran" required>
                  <option value="">Pilih TA</option>
                  <option v-for="t in tahunList" :key="t" :value="t">{{ t }}</option>
                </select>
              </div>
              <div class="field">
                <label for="status">Status</label>
                <select id="status" v-model="form.status">
                  <option value="Draft">Draft</option>
                  <option value="Review">Review</option>
                  <option value="Selesai">Selesai</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>File</label>
              <div v-if="form.fileUrl" class="file-current">
                <span v-html="icons.fileIcon" style="flex-shrink:0;opacity:0.5"></span>
                <a :href="form.fileUrl" target="_blank" style="flex:1">Lihat file saat ini</a>
                <button type="button" class="btn btn-ghost btn-xs" @click="form.fileUrl = ''"><span v-html="icons.trash"></span></button>
              </div>
              <div style="display:flex;gap:0.5rem;align-items:center">
                <input type="file" ref="fileInput" @change="onFileChange" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.png" style="flex:1;height:44px;padding:0.5rem 0;border:none;background:none;font-size:0.825rem">
                <span v-if="uploading" class="spinner" style="width:20px;height:20px;border-width:2px;flex-shrink:0"></span>
              </div>
              <p class="field-hint">Format: PDF, DOC, XLS, JPG, PNG. Maksimal 10MB.</p>
            </div>
            <p v-if="error" class="field-error"><span v-html="icons.alertCircle"></span>{{ error }}</p>
            <div class="form-actions">
              <a href="#/dokumen" class="btn btn-ghost">Batal</a>
              <button type="submit" class="btn btn-primary" :disabled="submitting">
                <span v-if="submitting" class="spinner" style="width:18px;height:18px;border-width:2px"></span>
                {{ submitting ? 'Menyimpan...' : 'Simpan' }}
              </button>
            </div>
          </form>
        </div>
      `,
      setup() {
        const kategories = ref([]);
        const form = reactive({ nama: '', kategoriId: '', noDokumen: '', tanggal: '', tahunAnggaran: '', status: 'Draft', fileUrl: '' });
        const isEdit = ref(false);
        const editId = ref(null);
        const error = ref('');
        const submitting = ref(false);
        const uploading = ref(false);
        const fileInput = ref(null);
        const tahunList = ref([]);

        var y = new Date().getFullYear();
        for (var i = 0; i < 10; i++) tahunList.value.push((y - i).toString());

        onMounted(function() {
          api('kategori_list').then(function(k) { if (!k.error) kategories.value = k; });
          var match = location.hash.match(/\/dokumen\/(.+)\/edit/);
          if (match) {
            isEdit.value = true;
            editId.value = match[1];
            api('dokumen_get', { id: editId.value }).then(function(d) {
              if (d.error) { error.value = d.error; return; }
              form.nama = d.nama;
              form.kategoriId = d.kategoriId;
              form.noDokumen = d.noDokumen || '';
              form.tanggal = d.tanggal || '';
              form.tahunAnggaran = d.tahunAnggaran || '';
              form.status = d.status || 'Draft';
              form.fileUrl = d.fileUrl || '';
            });
          }
        });

        function onFileChange(e) {
          var file = e.target.files[0];
          if (!file) return;
          if (file.size > 10 * 1024 * 1024) { error.value = 'File maksimal 10MB'; return; }
          uploading.value = true;
          error.value = '';
          var reader = new FileReader();
          reader.onload = function() {
            var base64 = reader.result.split(',')[1];
            api('upload', { filename: file.name, mimeType: file.type, base64: base64 }).then(function(res) {
              uploading.value = false;
              if (res.success) { form.fileUrl = res.fileUrl; }
              else { error.value = res.error || 'Upload gagal'; }
            });
          };
          reader.onerror = function() { uploading.value = false; error.value = 'Gagal membaca file'; };
          reader.readAsDataURL(file);
        }

        function submit() {
          error.value = '';
          submitting.value = true;
          var data = { nama: form.nama, kategoriId: form.kategoriId, noDokumen: form.noDokumen, tanggal: form.tanggal, tahunAnggaran: form.tahunAnggaran, status: form.status, fileUrl: form.fileUrl };

          if (isEdit.value) {
            api('dokumen_update', { id: editId.value, data: data }).then(function(res) {
              submitting.value = false;
              if (res.success) { location.hash = '#/dokumen/' + editId.value; toast('Dokumen berhasil diperbarui', 'success'); }
              else { error.value = res.error; }
            });
          } else {
            api('dokumen_create', { data: data }).then(function(res) {
              submitting.value = false;
              if (res.success) { location.hash = '#/dokumen/' + res.id; toast('Dokumen berhasil ditambahkan', 'success'); }
              else { error.value = res.error; }
            });
          }
        }

        return { kategories, form, isEdit, error, submitting, uploading, fileInput, tahunList, onFileChange, submit, icons };
      }
    };

    const DokumenDetail = {
      template: `
        <div class="page">
          <a href="#/dokumen" class="back-link"><span v-html="icons.arrowLeft"></span>Kembali</a>
          <div v-if="loading" class="empty"><div class="spinner"></div><div class="empty-text" style="margin-top:0.75rem">Memuat...</div></div>
          <div v-else-if="doc.error" class="empty"><div class="empty-text">{{ doc.error }}</div></div>
          <div v-else class="detail-card">
            <div class="detail-header">
              <h2 class="page-title" style="margin-bottom:0">{{ doc.nama }}</h2>
              <StatusBadge :status="doc.status" />
            </div>
            <table class="detail-table">
              <tr><td>Kategori</td><td>{{ kategoriName }}</td></tr>
              <tr><td>No. Dokumen</td><td>{{ doc.noDokumen || '-' }}</td></tr>
              <tr><td>Tanggal</td><td>{{ doc.tanggal || '-' }}</td></tr>
              <tr><td>Tahun Anggaran</td><td>{{ doc.tahunAnggaran }}</td></tr>
              <tr><td>Diunggah oleh</td><td>{{ doc.uploaderEmail }}</td></tr>
              <tr><td>Dibuat</td><td>{{ formatDate(doc.createdAt) }}</td></tr>
              <tr><td>Diperbarui</td><td>{{ formatDate(doc.updatedAt) || '-' }}</td></tr>
              <tr><td>File</td><td>
                <a v-if="doc.fileUrl" :href="doc.fileUrl" target="_blank" class="btn btn-primary btn-sm"><span v-html="icons.external"></span>Buka di Drive</a>
                <span v-else class="text-muted" style="font-size:0.875rem">Tidak ada file</span>
              </td></tr>
            </table>
            <div class="detail-actions" v-if="canEdit">
              <a :href="'#/dokumen/' + doc.id + '/edit'" class="btn btn-primary btn-sm"><span v-html="icons.edit"></span>Edit</a>
              <button class="btn btn-danger btn-sm" @click="confirmDelete"><span v-html="icons.trash"></span>Hapus</button>
            </div>
          </div>
        </div>
      `,
      setup() {
        const doc = ref({});
        const loading = ref(true);
        const kategories = ref([]);
        const canEdit = computed(function() {
          return store.user && (store.user.role === 'Admin' || store.user.role === 'Operator');
        });
        const kategoriName = computed(function() {
          var k = kategories.value.find(function(k) { return k.id === doc.value.kategoriId; });
          return k ? k.nama : '-';
        });

        function formatDate(iso) {
          if (!iso) return '-';
          return new Date(iso).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function confirmDelete() {
          if (!confirm('Yakin ingin menghapus dokumen ini?')) return;
          var id = location.hash.match(/\/dokumen\/([^/]+)/)[1];
          api('dokumen_delete', { id: id }).then(function(res) {
            if (res.success) { location.hash = '#/dokumen'; toast('Dokumen berhasil dihapus', 'success'); }
          });
        }

        onMounted(function() {
          var id = location.hash.match(/\/dokumen\/([^/]+)/)[1];
          api('kategori_list').then(function(k) { if (!k.error) kategories.value = k; });
          api('dokumen_get', { id: id }).then(function(d) { doc.value = d; loading.value = false; });
        });

        return { doc, loading, kategories, canEdit, kategoriName, formatDate, confirmDelete, icons };
      }
    };

    const KategoriList = {
      template: `
        <div class="page">
          <div class="page-header">
            <h2 class="page-title">Kelola Kategori</h2>
            <button class="btn btn-primary btn-sm" @click="showForm = !showForm"><span v-html="icons.plus"></span>Baru</button>
          </div>
          <form v-if="showForm" class="inline-form" @submit.prevent="addKategori">
            <input v-model="newNama" placeholder="Nama kategori" required>
            <button type="submit" class="btn btn-primary btn-sm"><span v-html="icons.plus"></span>Simpan</button>
            <button type="button" class="btn btn-ghost btn-sm" @click="showForm = false">Batal</button>
          </form>
          <div class="card">
            <div v-for="k in list" :key="k.id" class="list-item">
              <span class="list-item-title">{{ k.nama }}</span>
              <button class="btn btn-danger btn-xs" @click="hapus(k.id)"><span v-html="icons.trash"></span>Hapus</button>
            </div>
            <div v-if="!list.length" class="empty">
              <div class="empty-icon" v-html="icons.tag" style="opacity:0.3"></div>
              <div class="empty-text">Belum ada kategori</div>
              <div class="empty-hint">Tambahkan kategori untuk mengelompokkan dokumen</div>
            </div>
          </div>
        </div>
      `,
      setup() {
        const list = ref([]);
        const showForm = ref(false);
        const newNama = ref('');

        function load() { api('kategori_list').then(function(k) { if (!k.error) list.value = k; }); }
        function addKategori() {
          api('kategori_create', { nama: newNama.value }).then(function() {
            newNama.value = ''; showForm.value = false; load(); toast('Kategori berhasil ditambahkan', 'success');
          });
        }
        function hapus(id) {
          if (!confirm('Hapus kategori ini?')) return;
          api('kategori_delete', { id: id }).then(function() { load(); toast('Kategori berhasil dihapus', 'success'); });
        }

        onMounted(load);
        return { list, showForm, newNama, addKategori, hapus, icons };
      }
    };

    const UserList = {
      template: `
        <div class="page">
          <div class="page-header">
            <h2 class="page-title">Kelola Pengguna</h2>
            <button class="btn btn-primary btn-sm" @click="showForm = !showForm"><span v-html="icons.plus"></span>Tambah</button>
          </div>
          <form v-if="showForm" class="inline-form" @submit.prevent="addUser">
            <input v-model="form.email" placeholder="Email" required type="email">
            <input v-model="form.nama" placeholder="Nama" required>
            <select v-model="form.role" required>
              <option value="">Pilih Role</option>
              <option value="Admin">Admin</option>
              <option value="Operator">Operator</option>
              <option value="Viewer">Viewer</option>
              <option value="Kabid">Kepala Bidang</option>
            </select>
            <input v-model="form.password" placeholder="Password" required type="password" style="min-width:130px">
            <button type="submit" class="btn btn-primary btn-sm"><span v-html="icons.plus"></span>Simpan</button>
            <button type="button" class="btn btn-ghost btn-sm" @click="showForm = false">Batal</button>
          </form>
          <div class="table-wrap" style="display:block">
            <table class="table">
              <thead><tr><th>Email</th><th>Nama</th><th>Role</th><th>Aksi</th></tr></thead>
              <tbody>
                <tr v-for="u in users" :key="u.email">
                  <td>{{ u.email }}</td><td>{{ u.nama }}</td>
                  <td><StatusBadge :status="u.role" /></td>
                  <td><button class="btn btn-danger btn-xs" @click="hapus(u.email)" :disabled="u.email === 'admin'"><span v-html="icons.trash"></span></button></td>
                </tr>
                <tr v-if="!users.length"><td colspan="4"><div class="empty"><div class="empty-icon" v-html="icons.users" style="opacity:0.3"></div><div class="empty-text">Belum ada pengguna</div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      `,
      setup() {
        const users = ref([]);
        const showForm = ref(false);
        const form = reactive({ email: '', nama: '', role: '', password: '' });

        function load() { api('users_list').then(function(u) { if (!u.error) users.value = u; }); }
        function addUser() {
          api('users_create', { data: { email: form.email, nama: form.nama, role: form.role, password: form.password } }).then(function() {
            form.email = ''; form.nama = ''; form.role = ''; form.password = '';
            showForm.value = false; load(); toast('Pengguna berhasil ditambahkan', 'success');
          });
        }
        function hapus(email) {
          if (!confirm('Hapus pengguna ' + email + '?')) return;
          api('users_delete', { email: email }).then(function() { load(); toast('Pengguna berhasil dihapus', 'success'); });
        }

        onMounted(load);
        return { users, showForm, form, addUser, hapus, icons };
      }
    };

    const UbahPassword = {
      template: `
        <div class="page">
          <h2 class="page-title">Ganti Password</h2>
          <div class="card form-card" style="max-width:420px">
            <form @submit.prevent="submit">
              <div class="field">
                <label for="old">Password Lama</label>
                <input id="old" v-model="oldPassword" type="password" required placeholder="Masukkan password lama">
              </div>
              <div class="field">
                <label for="new">Password Baru</label>
                <input id="new" v-model="newPassword" type="password" required minlength="6" placeholder="Minimal 6 karakter">
              </div>
              <div class="field">
                <label for="confirm">Konfirmasi Password Baru</label>
                <input id="confirm" v-model="confirmPassword" type="password" required minlength="6" placeholder="Ulangi password baru">
              </div>
              <p v-if="error" class="field-error"><span v-html="icons.alertCircle"></span>{{ error }}</p>
              <p v-if="success" class="field-success"><span v-html="icons.check"></span>Password berhasil diubah</p>
              <button type="submit" class="btn btn-primary btn-full" :disabled="submitting">
                <span v-if="submitting" class="spinner" style="width:18px;height:18px;border-width:2px"></span>
                {{ submitting ? 'Menyimpan...' : 'Simpan' }}
              </button>
            </form>
          </div>
        </div>
      `,
      setup() {
        const oldPassword = ref('');
        const newPassword = ref('');
        const confirmPassword = ref('');
        const error = ref('');
        const success = ref(false);
        const submitting = ref(false);

        function submit() {
          error.value = '';
          success.value = false;
          if (newPassword.value !== confirmPassword.value) { error.value = 'Konfirmasi password tidak cocok'; return; }
          if (newPassword.value.length < 6) { error.value = 'Password baru minimal 6 karakter'; return; }
          submitting.value = true;
          api('changePassword', { oldPassword: oldPassword.value, newPassword: newPassword.value }).then(function(res) {
            submitting.value = false;
            if (res.success) { success.value = true; oldPassword.value = ''; newPassword.value = ''; confirmPassword.value = ''; }
            else { error.value = res.error; }
          });
        }

        return { oldPassword, newPassword, confirmPassword, error, success, submitting, submit, icons };
      }
    };

    routes = {
      '/dashboard': Dashboard,
      '/dokumen': DokumenList,
      '/dokumen/tambah': DokumenForm,
      '/dokumen/:id': DokumenDetail,
      '/dokumen/:id/edit': DokumenForm,
      '/kategori': KategoriList,
      '/users': UserList,
      '/ubah-password': UbahPassword,
    };

    const App = {
      components: { Login, AppLayout, RouterView, Icon, StatusBadge, SortIcon },
      template: '<div v-if="loading" class="loading-screen"><div class="spinner"></div><span class="loader-text">Memuat...</span></div><Login v-else-if="!store.user" /><AppLayout v-else :user="store.user" @logout="handleLogout"><RouterView /></AppLayout>',
      setup() {
        const loading = ref(false);
        function handleLogout() {
          api('logout').then(function() {
            store.token = null;
            store.user = null;
            toast('Berhasil keluar', 'info');
          });
        }
        return { loading, handleLogout, store };
      }
    };

    const app = createApp(App);
    app.component('StatusBadge', StatusBadge);
    app.component('Icon', Icon);
    app.component('SortIcon', SortIcon);
    app.mount('#app');
  </script>
</body>
</html>
